name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    name: ShellCheck (bash)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: '.'
          format: gcc

  psscriptanalyzer:
    name: PSScriptAnalyzer (PowerShell)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $issues = Invoke-ScriptAnalyzer -Path . -Recurse -Settings ./PSScriptAnalyzerSettings.psd1
          if ($issues) {
              $issues | Format-Table -AutoSize | Out-String | Write-Host
              Write-Error "PSScriptAnalyzer fand $($issues.Count) Probleme."
              exit 1
          }
          Write-Host "Keine PSScriptAnalyzer-Findings."

  tofu:
    name: OpenTofu fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: '1.8.x'

      - name: tofu fmt -check (recursive)
        run: tofu fmt -check -recursive -diff

      - name: tofu validate per module + example
        run: |
          set -e
          for dir in 01-adminservice-pwsh 02-adminservice-bash \
                     03-winrm-jumphost 04-sql-direct 05-cmdlets-package \
                     examples/basic-wait examples/full-vm-rollout; do
            echo "::group::tofu validate $dir"
            (cd "$dir" && tofu init -backend=false && tofu validate)
            echo "::endgroup::"
          done

  markdownlint:
    name: Markdownlint (docs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !**/node_modules/**
